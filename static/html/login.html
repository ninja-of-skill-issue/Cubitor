<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Cubing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Roboto+Mono:wght@100;300;400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="login-screen">
    <div class="login-card">
        <div class="login-logo">Cubing</div>
        <p class="login-subtitle">Track your speed. Crush your PBs.</p>

        <form id="login-form">
            <div class="form-group">
                <label for="email">EMAIL ADDRESS</label>
                <input type="email" id="email" class="form-input" placeholder="name@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">PASSWORD</label>
                <input type="password" id="password" class="form-input" placeholder="••••••••" required>
            </div>

            <button type="submit" class="modal-btn primary login-btn">Login</button>
        </form>

        <div class="login-divider">OR</div>

        <button class="social-login-btn">
            <svg width="18" height="18" viewBox="0 0 18 18">
                <path fill="#4285F4"
                    d="M17.64 9.2c0-.63-.06-1.25-.16-1.84H9v3.49h4.84c-.21 1.12-.84 2.07-1.79 2.7l2.78 2.16c1.63-1.5 2.57-3.71 2.57-6.51z" />
                <path fill="#34A853"
                    d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.78-2.16c-.77.52-1.76.83-3.18.83-2.43 0-4.5-1.64-5.23-3.84H.91v2.28C2.39 15.65 5.43 18 9 18z" />
                <path fill="#FBBC05"
                    d="M3.77 10.65c-.19-.52-.29-1.08-.29-1.65s.1-1.13.29-1.65V5.07H.91C.33 6.25 0 7.59 0 9s.33 2.75.91 3.93l2.86-2.28z" />
                <path fill="#EA4335"
                    d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58C13.47.89 11.43 0 9 0 5.43 0 2.39 2.35.91 5.07l2.86 2.28C4.5 5.22 6.57 3.58 9 3.58z" />
            </svg>
            Continue with Google
        </button>

        <div class="login-footer">
            <a href="register.html" class="login-link">Create Account</a>
            <a href="#" class="login-link">Forgot Password?</a>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script>
        // Check for pre-fill data from registration
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const emailParam = urlParams.get('email');
            if (emailParam) {
                document.getElementById('email').value = emailParam;
                // Move focus to password for a faster flow
                document.getElementById('password').focus();
            }
        });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const loginData = {
                email: email,
                password: password
            };

            console.log("Attempting login via api.js to:", LOGIN_URL);

            try {
                const result = await postData(LOGIN_URL, loginData);
                
                // Extract token from various possible result structures
                const token = result.token || result.accessToken || (result.data && result.data.token);
                
                if (token) {
                    setEncryptedToken(token, 7);
                    window.location.href = "main_page.html";
                } else {
                    console.error("Login successful but no token received in response:", result);
                    alert("Login failed: No authentication token received.");
                }
            } catch (error) {
                console.error("Login Error:", error.message);
                alert("Login failed: " + error.message);
            }
        });
    </script>
</body>

</html>
