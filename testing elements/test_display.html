<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WCA Scramble Display - NxN Testing (v2.1 Alg Mode)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0f172a;
            --text-primary: #f8f9fa;
            --accent-primary: #8b5cf6;
            --bg-card: rgba(30, 41, 59, 0.7);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; padding: 20px;
        }

        .container {
            max-width: 1100px; width: 100%; background: var(--bg-card);
            padding: 20px 30px; border-radius: 32px; box-shadow: 0 10px 50px rgba(0,0,0,0.5);
            backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); text-align: center;
        }

        h1 {
            font-weight: 700; margin-bottom: 30px; letter-spacing: -1px;
            background: linear-gradient(135deg, #fff 0%, #a78bfa 100%);
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
        }

        .event-selector { display: flex; gap: 8px; justify-content: center; margin-bottom: 24px; flex-wrap: wrap; }
        .event-btn {
            padding: 10px 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; border-radius: 12px; cursor: pointer; transition: all 0.2s ease; font-weight: 600;
        }
        .event-btn.active { background: var(--accent-primary); border-color: var(--accent-primary); box-shadow: 0 0 15px rgba(139, 92, 246, 0.4); }
        .event-btn:hover:not(.active) { background: rgba(255,255,255,0.1); }

        input {
            width: 100%; padding: 18px; background: rgba(0,0,0,0.4); border: 2px solid rgba(255,255,255,0.1);
            border-radius: 16px; color: #fff; font-size: 16px; outline: none; margin-bottom: 20px;
            text-align: center; box-sizing: border-box;
        }

        .display-area { display: flex; justify-content: center; min-height: 200px; align-items: center; }
        
        .visualizer-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 20px;
        }

        .visualizer-card {
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .visualizer-card h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .preset-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 8px; margin-bottom: 20px; }
        button.preset {
            padding: 8px 12px; background: rgba(255, 255, 255, 0.02); color: rgba(255,255,255,0.6);
            border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 8px; cursor: pointer; font-size: 11px;
            transition: all 0.2s ease;
        }
        button.preset:hover { background: rgba(139,92,246,0.1); color: #fff; border-color: var(--accent-primary); }
    </style>
</head>
<body>

    <div class="container">
        <h1>WCA NxN Visualizer</h1>

        <div class="event-selector" id="event-selector">
            <button class="event-btn" onclick="setEvent('222')">2x2</button>
            <button class="event-btn active" onclick="setEvent('333')">3x3</button>
            <button class="event-btn" onclick="setEvent('444')">4x4</button>
            <button class="event-btn" onclick="setEvent('555')">5x5</button>
            <button class="event-btn" onclick="setEvent('666')">6x6</button>
            <button class="event-btn" onclick="setEvent('777')">7x7</button>
            <button class="event-btn" onclick="setEvent('pyram')">Pyra</button>
            <button class="event-btn" onclick="setEvent('skewb')">Skewb</button>
            <button class="event-btn" onclick="setEvent('minx')">Mega</button>
        </div>

        <div class="preset-grid" id="preset-grid">
            <!-- Dynamic presets -->
        </div>

        <input type="text" id="scramble-input" placeholder="Type scramble here..." oninput="updateDisplay()" style="margin-bottom: 10px; padding: 14px;">

        <div class="visualizer-grid">
            <div class="visualizer-card">
                <h3>Global Net</h3>
                <div class="display-area" style="min-height: 180px;">
                    <custom-scramble-display id="visualizer" event="333" scramble="" style="max-width: 180px;"></custom-scramble-display>
                </div>
            </div>

            <div class="visualizer-card">
                <h3>Top View (Alg)</h3>
                <div class="display-area" style="min-height: 180px;">
                    <nxn-top-view id="alg-visualizer" size="3" style="max-width: 150px;"></nxn-top-view>
                </div>
                <div class="event-selector" style="margin: 10px 0 0 0; gap: 4px;">
                    <button class="event-btn" style="padding: 6px 10px; font-size: 12px;" onclick="setAlg('T-Perm')">T</button>
                    <button class="event-btn" style="padding: 6px 10px; font-size: 12px;" onclick="setAlg('Y-Perm')">Y</button>
                    <button class="event-btn" style="padding: 6px 10px; font-size: 12px;" onclick="setAlg('Sune')">S</button>
                    <button class="event-btn" style="padding: 6px 10px; font-size: 12px;" onclick="setAlg('JB-Perm')">JB</button>
                </div>
            </div>

            <div class="visualizer-card">
                <h3>3D Isometric</h3>
                <div class="display-area" style="min-height: 180px;">
                    <nxn-isometric-view id="isometric-visualizer" size="3" style="max-width: 180px;"></nxn-isometric-view>
                </div>
            </div>
        </div>
    </div>

    <script src="custom_scramble_display.js"></script>
    <script src="nxn_top_view.js"></script>
    <script src="nxn_isometric_view.js"></script>
    <script type="module">
        import { Alg } from "https://cdn.cubing.net/v0/js/cubing/alg";
        window.Alg = Alg;
    </script>
    <script>
        const input = document.getElementById('scramble-input');
        const visualizer = document.getElementById('visualizer');
        const presetGrid = document.getElementById('preset-grid');
        let currentEvent = '333';

        const presets = {
            '222': ["R U2 R' U' F' R2 U' R' U'"],
            '333': ["R U R' U' R' F R2 U' R' U' R U R' F'", "6(R U R' U')"],
            '444': ["Rw2 F2 U2 F2 Rw2 F2 U2 F2", "Rw U Rw' U' Rw' F Rw2 U' Rw' U' Rw U Rw' F'"],
            '555': ["3Rw U 3Rw' U' 3Rw' F 3Rw2 U' 3Rw' U' 3Rw U 3Rw' F'"],
            '666': ["3Uw2 3Rw2 3Uw2 3Rw2", "4Rw U 4Rw'"],
            '777': ["4Rw U 4Rw' U' 4Rw' F 4Rw2", "2(4Rw U 4Rw')"],
            'pyram': ["U R L B u r l b", "R' L R L' U R U' l' r"],
            'skewb': ["R L R' L' U R U' L'"],
            'minx': ["R++ D++ R-- D-- R++ D++ R-- D-- R++ D++ U'", "R++ D++ R++ D++ R++ D++ R++ D++ R++ D++ U'"]
        };

        function setEvent(ev) {
            currentEvent = ev;
            document.querySelectorAll('.event-btn').forEach(btn => {
                btn.classList.toggle('active', btn.onclick.toString().includes(`'${ev}'`));
            });
            visualizer.setAttribute('event', ev);
            updatePresets();
            input.value = presets[ev][0] || "";
            updateDisplay();
        }

        function updatePresets() {
            presetGrid.innerHTML = '';
            (presets[currentEvent] || []).forEach(p => {
                const btn = document.createElement('button');
                btn.className = 'preset';
                btn.innerText = p.length > 20 ? p.substring(0, 17) + '...' : p;
                btn.onclick = () => { input.value = p; updateDisplay(); };
                presetGrid.appendChild(btn);
            });
        }

        function updateDisplay() {
            let val = input.value;
            if (window.Alg && val.trim()) {
                try {
                    val = Alg.fromString(val).expand().experimentalSimplify().toString();
                } catch(e) {}
            }
            visualizer.setAttribute('scramble', val);
            const iso = document.getElementById('isometric-visualizer');
            if (iso) {
                const sizeMap = { '222': 2, '333': 3, '444': 4, '555': 5, '666': 6, '777': 7 };
                const size = sizeMap[currentEvent] || 3;
                iso.setAttribute('size', size);
                iso.setAttribute('scramble', val);
            }
        }

        const algMap = {
            'T-Perm': "R U R' U' R' F R2 U' R' U' R U R' F'",
            'Y-Perm': "F R U' R' U' R U R' F' R U R' U' R' F R F'",
            'Sune': "R U R' U R U2 R'",
            'JB-Perm': "R U R' F' R U R' U' R' F R2 U' R'"
        };

        function setAlg(name) {
            const el = document.getElementById('alg-visualizer');
            let val = algMap[name];
            if (el && val) {
                if (window.Alg) {
                    try {
                        val = Alg.fromString(val).expand().experimentalSimplify().toString();
                    } catch(e) {}
                }
                el.setAttribute('scramble', val);
            }
        }

        setAlg('T-Perm');

        updatePresets();
    </script>
</body>
</html>
